<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra boda | Fer y Ale</title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    
</head>
<body>
    <main>
        <div class="Header-Inv">
            <img class="HeaderBg-Img" src="./assets/imgheader.jpg" alt="img">
            <div class="HeaderOverlay"></div>
            <div class="Header-Inv-Content">
                <div class="PreHeader">
                    <p class="PreHeader-Text">Nuestra boda</p>
                </div>
                <div class="HeaderNombres">
                    <p class="HeaderNombres-Text">Fer</p>
                    <p class="HeaderNombres-Text">y</p>
                    <p class="HeaderNombres-Text">Ale</p>
                </div>
                <div class="HeaderDate">
                    <p class="HeaderDate-Text">14</p>
                    <p class="HeaderDate-Text">Nov</p>
                    <p class="HeaderDate-Text">2026</p>
                </div>
            </div>
        </div>
        <section class="SectionInvitacion SectionTickets BgBlue WhiteText">
            <p class="SectionTitle">Te invitamos</p>
            <p class="NameInvitado" id="nameInvitado"></p>
            <p class="SectionPar-Text">A festejar con nosotros nuestra unión matrimonial</p>
            <div class="SectionTickets-Wrapp">
                <p class="Section-SecondTitle">Tenemos reservados</p>
                <img class="Header-Icon" src="./assets/ticket-icon.png" alt="img">
                <div class="TicketsInv-Wrapp">
                    <p class="TicketsText">Para ti</p>
                    <div class="TicketsNumber-Wrapp">
                        <span class="TicketsNumber" id="TicketsNumber">2</span>
                    </div>
                    <p class="TicketsText">lugares</p>
                </div>
            </div>
        </section>

        <section class="Section-Date BgBeige BlueText">
            <div class="SectionDate-Wrapp">
                <div class="Section-Date-Photo-Wrapp">
                    <img class="Section-Date-Photo" src="./assets/imgheader.jpg">
                    <div class="Section-Date-Photo-Overlay"></div>
                </div>
                <div class="Section-Date-Wrapp">
                    <div class="Header-IconTitle">
                        <img class="Header-Icon" src="./assets/calendar-icon.png">
                        <p class="SectionTitle">Fecha</p>
                    </div>
                    <div class="Date-Wrapp">
                        <p class="Date-Element">14</p>
                        <p class="Date-Element">Nov</p>
                        <p class="Date-Element">2026</p>
                    </div>                    
                </div>
            </div>
        </section>

        <section class="SectionCounter">
            <div class="CounterHeader BgLila WhiteText">
                <img class="CounterHeader-Flor" src="./assets/flor-lila.png" alt="icon">
                <p class="SectionTitle">Faltan</p>
            </div>
            <div class="DateInv-Wrapp">
                <div class="DateInv-CounterWrapp WhiteText">
                    <div class="DateInv-CounterElem">
                        <p class="DateInv-Counter-Day DateInv-Counter-Num"></p>
                        <p class="DateInv-Counter-Text">Dias</p>
                    </div>
                    <div class="DateInv-CounterElem">
                        <p class="DateInv-Counter-Hrs DateInv-Counter-Num"></p>
                        <p class="DateInv-Counter-Text">Hrs</p>
                    </div>
                    <div class="DateInv-CounterElem">
                        <p class="DateInv-Counter-Min DateInv-Counter-Num"></p>
                        <p class="DateInv-Counter-Text">Min</p>
                    </div>
                    <div class="DateInv-CounterElem">
                        <p class="DateInv-Counter-Seg DateInv-Counter-Num"></p>
                        <p class="DateInv-Counter-Text">Seg</p>
                    </div>
                    <div class="CounterLine-Wrapp">
                        <div class="CounterTrack">
                            <div class="CounterLine"></div>
                        </div>
                        <div class="CounterIconFinal-IconWrapp">
                            <img class="CounterIconFinal-Icon" src="./assets/anillos-icon.png">
                        </div>               
                    </div>
                </div>
            </div>
            
        </section>

        <section class="SectionInvitacion Section-Adress">
            <div class="Header-IconTitle">
                <img class="Header-Icon" src="./assets/iglesia-icon.png">
                <p class="SectionTitle">Ceremonia Religiosa</p>
            </div>

        </section>
    </main>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>
    <script src="./js.js"></script>

</body>
</html>
